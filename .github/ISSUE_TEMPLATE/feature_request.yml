name: Feature request
description: Suggest an idea for this project
title: "[FEAT]: "
labels: ["feature-request", "enhancement"]
body:
  - type: textarea
    id: related-problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
      placeholder: "I'm always frustrated when..."
    validations:
      required: true
      
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: "I'd like to be able to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: "I've considered..."

  - type: input
    id: r_version
    attributes:
      label: R version
      description: What version of R are you using?
      placeholder: "e.g., 4.3.1"
  
  - type: input
    id: os
    attributes:
      label: Operating System
      description: |
        Which OS and environment are you using?
      placeholder: "e.g., Windows 11, macOS 14, Ubuntu 22.04"

  - type: input
    id: data_source
    attributes:
      label: Data source format
      description: |
        What kind of data are you using (e.g., Kobo export, cleaned XLSX, etc.)?

  - type: checkboxes
    id: existing_issues
    attributes:
      label: Have you checked for existing issues?
      options:
        - label: I have searched existing issues and none match this one.
          required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
